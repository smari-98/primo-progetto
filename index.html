<!DOCTYPE html>
<html lang="it-IT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuovo Inizio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Primi giorni</h1>

<div class="card">
	<h2>Sviluppatrice in erba</h2>
	<p> Hi everyone!!</p>
	<p>Sto iniziando il mio percorso nello sviluppo web come autodidatta.</p>
</div>

<div class="card">
<p>Hai cliccato <span id="counter">0</span> volte </p>
<button onclick="contaClick()">Conta click</button>
<script>
  let count = 0;

  function contaClick() {
    count++;
    document.getElementById("counter").innerText = count;
  }
</script>
</div>
	
<div class="card">
    <h3>Prova la mia somma in JS!</h3>
    <input type="number" id="num1" placeholder="Primo numero">
    <input type="number" id="num2" placeholder="Secondo numero">
    <button id="sommaBtn">Calcola</button>
    <p>Risultato: <span id="risultato">0</span></p>
</div>

<p>
 <img src="https://www.raiscuola.rai.it/dl/img/2021/03/25/1616683561166_1582717587391_technology-1283624_1920.jpg" alt="Immagine di coding">   
</p>

<script src="script.js"></script>

</body>
</html>
